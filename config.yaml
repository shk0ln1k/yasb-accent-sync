watch_stylesheet: true
watch_config: true
debug: false
komorebi:
  start_command: komorebic start --whkd
  stop_command: komorebic stop --whkd
  reload_command: komorebic stop --whkd && komorebic start --whkd
bars:
  primary-bar:
    enabled: true
    screens:
    - '*'
    class_name: yasb-bar
    alignment:
      position: top
    blur_effect:
      enabled: false
      dark_mode: true
      round_corners: false
      border_color: None
    window_flags:
      always_on_top: true
      windows_app_bar: true
      hide_on_fullscreen: true
    dimensions:
      width: 100%
      height: 28
    padding:
      top: 3
      left: 8
      bottom: 2
      right: 8
    widgets:
      left:
      - home
      - komorebi_workspaces
      - active_window
      center:
      - clock
      right:
      - cava
      - media
      - volume
      - github
      - disk
widgets:
  home:
    type: yasb.home.HomeWidget
    options:
      label: "<span>\uDB80\uDF5C</span>"
      menu_list:
      - title: Home
        path: '~'
      - title: Downloads
        path: ~\Downloads
      - title: Documents
        path: ~\Documents
      - title: Pictures
        path: ~\Pictures
      - title: Videos
        path: ~\Videos
      system_menu: true
      power_menu: false
      blur: true
      round_corners: true
      round_corners_type: normal
      border_color: ''
      alignment: left
      direction: down
      menu_labels:
        shutdown: Shutdown
        restart: Restart
        logout: Logout
        lock: Lock
        sleep: Sleep
        system: System Settings
        about: About This PC
        task_manager: Task Manager
  komorebi_workspaces:
    type: komorebi.workspaces.WorkspaceWidget
    options:
      label_offline: ⚡ Offline
      label_workspace_btn: ''
      label_workspace_active_btn: ''
      label_workspace_populated_btn: ''
      label_default_name: '{index}'
      label_zero_index: false
      hide_empty_workspaces: false
      hide_if_offline: false
  weather:
    type: yasb.weather.WeatherWidget
    options:
      label: <span>{icon}</span> {temp}
      label_alt: '<span>{icon}</span> {location}: Min {min_temp}, Max {max_temp},
        Humidity {humidity}'
      api_key: EnterYourAPIKeyHere
      update_interval: 600
      hide_decimal: true
      location: EnterYourLocationHere
      callbacks:
        on_left: toggle_label
      icons:
        sunnyDay: "\uDB81\uDD99"
        clearNight: "\uDB81\uDD99"
        cloudyDay: "\uDB81\uDD99"
        cloudyNight: "\uDB81\uDD99"
        rainyDay: "\uDB81\uDD99"
        rainyNight: "\uDB81\uDD99"
        snowyDay: "\uDB81\uDD99"
        snowyNight: "\uDB81\uDD99"
        blizzardDay: "\uDB81\uDD99"
        default: "\uDB81\uDD99"
  media:
    type: yasb.media.MediaWidget
    options:
      label: '{title}'
      label_alt: '{artist}'
      max_field_size:
        label: 25
        label_alt: 25
      show_thumbnail: false
      controls_only: false
      controls_left: true
      hide_empty: true
      thumbnail_alpha: 250
      thumbnail_padding: 8
      thumbnail_corner_radius: 0
      icons:
        prev_track: ''
        next_track: ''
        play: <span></span>
        pause: <span></span>
  active_window:
    type: yasb.active_window.ActiveWindowWidget
    options:
      label: '{win[title]}'
      label_alt: '[class_name=''{win[class_name]}'' exe=''{win[process][name]}'' hwnd={win[hwnd]}]'
      label_no_window: ''
      label_icon: true
      label_icon_size: 14
      max_length: 36
      max_length_ellipsis: '...'
      monitor_exclusive: true
  volume:
    type: yasb.volume.VolumeWidget
    options:
      label: <span>{icon}</span> {level}
      label_alt: '{volume}'
      icons:
      - 
      - 
      - 
      - 
      - 
      callbacks:
        on_right: exec cmd.exe /c start ms-settings:sound
  clock:
    type: yasb.clock.ClockWidget
    options:
      label: '{%a %b %d %H:%M}'
      label_alt: '{%A, %d %B %Y %H:%M}'
      timezones: []
      calendar:
        alignment: center
  disk:
    type: yasb.disk.DiskWidget
    options:
      label: <span></span>
      label_alt: <span></span>
      update_interval: 60
      group_label:
        volume_labels:
        - C
        - D
        - E
        - F
        show_label_name: false
        blur: true
        round_corners: true
        round_corners_type: small
        border_color: System
        alignment: right
        direction: down
      callbacks:
        on_left: toggle_group
        on_middle: toggle_label
        on_right: exec explorer C:\
  wallpapers:
    type: yasb.wallpapers.WallpapersWidget
    options:
      label: "<span>\uDB83\uDE09</span>"
      image_path: ~\.config\Wallpapers
      change_automatically: false
      update_interval: 60
      gallery:
        enabled: true
        blur: true
        image_width: 296
        image_per_page: 6
        show_buttons: true
        orientation: portrait
        image_spacing: 10
        lazy_load: true
        lazy_load_fadein: 200
        image_corner_radius: 20
  power_menu:
    type: yasb.power_menu.PowerMenuWidget
    options:
      label: 
      uptime: true
      blur: false
      blur_background: true
      animation_duration: 250
      button_row: 5
      buttons:
        signout:
        - "\uDB80\uDF43"
        - Sign out
        shutdown:
        - 
        - Shut Down
        restart:
        - 
        - Restart
        hibernate:
        - 
        - Hibernate
        cancel:
        - "\uDB81\uDF3A"
        - Cancel
  cava:
    type: yasb.cava.CavaWidget
    options:
      bar_height: 12
      gradient: 1
      reverse: 0
      sensitivity: 100
      foreground: '#143f85'
      gradient_color_1: '#728bb5'
      gradient_color_2: '#143f85'
      gradient_color_3: '#0e2c5d'
      bars_number: 8
      bar_spacing: 2
      bar_width: 4
      sleep_timer: 0
      hide_empty: false
  github:
    type: yasb.github.GithubWidget
    options:
      label: <span></span>
      label_alt: Notifications {data}
      token: env
      max_notification: 20
      only_unread: false
      max_field_size: 54
      update_interval: 300
      menu:
        blur: true
        round_corners: true
        round_corners_type: normal
        border_color: System
        alignment: right
        direction: down
